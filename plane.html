<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>雷霆战机 · THUNDER WING</title>
<style>
  :root{
    --bg:#0a0a0f;
    --panel:#16161f;
    --amber:#ffb300;
    --green:#3fca5a;
    --red:#e5483c;
    --blue:#4a9df0;
    --text:#e8e4d8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Courier New",ui-monospace,monospace;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;height:100dvh;
    padding:6px calc(6px + env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom)) calc(6px + env(safe-area-inset-left));
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    touch-action:none;
    overscroll-behavior:none;
  }
  h1{
    font-size:clamp(14px,3.6vw,28px);
    letter-spacing:.3em;
    color:var(--amber);
    text-shadow:2px 2px 0 #7a4a00;
    margin-bottom:6px;
    font-weight:900;
    flex:0 0 auto;
  }
  #hud{
    width:var(--stageW,min(94vw,420px));
    display:flex;justify-content:space-between;align-items:center;gap:6px;
    background:var(--panel);
    border:2px solid #2a2a38;
    padding:5px 8px;margin-bottom:6px;
    font-size:clamp(10px,2.8vw,13px);letter-spacing:.04em;
    flex:0 0 auto;
  }
  #hud .lives{color:var(--green);}
  #hud .score{color:var(--amber);}
  #hud .enemies{color:var(--red);}
  #ctrlBar{
    width:var(--stageW,min(94vw,420px));
    display:flex;gap:6px;margin-bottom:6px;flex:0 0 auto;
  }
  .cbtn{
    flex:1;
    background:var(--panel);border:2px solid #3a3a4c;color:var(--text);
    font-family:inherit;font-size:12px;letter-spacing:.08em;
    padding:8px 4px;white-space:nowrap;
  }
  .cbtn:active{background:#2c2c3c;}
  .cbtn.on{border-color:var(--amber);color:var(--amber);}
  #stageWrap{
    flex:1 1 auto;min-height:0;width:100%;
    display:flex;align-items:center;justify-content:center;
  }
  #stage{
    position:relative;
    height:100%;
    aspect-ratio:3/5;
    max-width:94vw;
  }
  canvas{
    display:block;
    background:#000;
    border:3px solid #2a2a38;
    image-rendering:pixelated;
    width:100%;height:100%;
  }
  #overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,5,10,.86);
    text-align:center;gap:12px;
    padding:0 14px;
  }
  #overlay.hidden{display:none;}
  #overlay .big{
    font-size:clamp(20px,4.6vw,34px);
    letter-spacing:.24em;font-weight:900;
    color:var(--amber);
    text-shadow:3px 3px 0 #7a4a00;
  }
  #overlay .big.lose{color:var(--red);text-shadow:3px 3px 0 #5c1410;}
  #overlay .big.win{color:var(--green);text-shadow:3px 3px 0 #14501f;}
  #overlay .sub{font-size:12px;line-height:1.9;color:#b8b2a2;letter-spacing:.06em;}
  #overlay button{
    font-family:inherit;font-size:15px;font-weight:900;letter-spacing:.2em;
    padding:11px 30px;cursor:pointer;
    background:var(--amber);color:#1a1200;
    border:none;box-shadow:0 4px 0 #7a4a00;
  }
  #overlay button:active{transform:translateY(3px);box-shadow:0 1px 0 #7a4a00;}
  #tips{margin-top:6px;font-size:10px;color:#6f6a5e;letter-spacing:.06em;text-align:center;line-height:1.7;flex:0 0 auto;}
  @media (pointer:coarse){ #tips{display:none;} h1{margin-bottom:4px;} }
</style>
</head>
<body>
<h1>雷霆战机</h1>
<div id="hud">
  <span style="color:#8ab4ff">关 <b id="level">1</b></span>
  <span class="lives">命 <b id="lives">3</b></span>
  <span id="godTag" style="color:var(--amber);display:none;">★</span>
  <span class="score">分 <b id="score">0</b></span>
  <span class="enemies">敌 <b id="enemies">0</b></span>
</div>
<div id="ctrlBar">
  <button class="cbtn" id="godBtn">★ 无敌</button>
  <button class="cbtn" id="sndBtn">🔊 全开</button>
</div>
<div id="stageWrap">
<div id="stage">
  <canvas id="game" width="360" height="600"></canvas>
  <div id="overlay">
    <div class="big" id="ovTitle">THUNDER WING</div>
    <div class="sub" id="ovSub"></div>
    <button id="ovBtn">开始游戏</button>
    <button id="ovBtn2" style="display:none;font-size:11px;padding:7px 12px;">从第1关开始</button>
  </div>
</div>
</div>
<div id="tips">手机:按住屏幕拖动(手指不用压着飞机) · 电脑:方向键/WASD · 自动开火 · G 无敌 · L 跳关</div>

<script>
(() => {
'use strict';
const CVS = document.getElementById('game');
const CTX = CVS.getContext('2d');
const W = CVS.width, H = CVS.height;
const MAX_LEVEL = 100;

let player, enemies, bullets, ebullets, drops, particles, stars, boss;
let keys = {}, lives, score, level = 1, kills, killTarget, spawnTimer, running = false, frame = 0;
let godMode = true, best = 0;

/* ---------- 存档 ---------- */
const store = {
  get(k, d){ try{ return localStorage.getItem(k) ?? d }catch(e){ return d } },
  set(k, v){ try{ localStorage.setItem(k, v) }catch(e){} }
};
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
const aabb = (a,b) => a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

/* ---------- 难度曲线 ---------- */
function levelConfig(lv){
  const isBoss = lv % 5 === 0;
  return {
    isBoss,
    killTarget: isBoss ? 1 : Math.min(60, 14 + lv * 2),
    spawnInterval: Math.max(18, 52 - lv),
    enemySpeed: 1.2 + Math.min(2.2, lv * 0.035),
    fireRate: Math.min(0.02, 0.004 + lv * 0.0003),
    midChance: Math.min(0.3, 0.06 + lv * 0.004),
    bossHp: 30 + lv * 4
  };
}
let cfg = levelConfig(1);

/* ---------- 声音（8-bit 精简引擎） ---------- */
let actx = null, musicGain = null, sfxGain = null;
let sndMode = parseInt(store.get('plane_snd', '0')) || 0; // 0全开 1仅音效 2静音
let musicTimer = null, musicPos = 0, musicNextTime = 0;

function ensureAudio(){
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = actx.createGain(); sfxGain = actx.createGain();
    musicGain.connect(actx.destination); sfxGain.connect(actx.destination);
    applySnd();
  } catch(e) { actx = null; }
}
function applySnd(){
  if (musicGain) musicGain.gain.value = sndMode === 0 ? 0.16 : 0;
  if (sfxGain) sfxGain.gain.value = sndMode === 2 ? 0 : 0.3;
  document.getElementById('sndBtn').textContent = ['🔊 全开','🔈 音效','🔇 静音'][sndMode];
}
function blip(freq, dur, type, gain, when){
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  const t = when || actx.currentTime;
  g.gain.setValueAtTime(gain || 0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(sfxGain);
  o.start(t); o.stop(t + dur);
}
function noise(dur, gain){
  if (!actx) return;
  const len = actx.sampleRate * dur;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
  const s = actx.createBufferSource(); s.buffer = buf;
  const g = actx.createGain(); g.gain.value = gain || 0.5;
  s.connect(g); g.connect(sfxGain); s.start();
}
const sfx = {
  shoot(){ blip(880, 0.06, 'square', 0.12); },
  boom(){ noise(0.3, 0.5); blip(120, 0.25, 'triangle', 0.4); },
  hit(){ blip(220, 0.1, 'sawtooth', 0.3); },
  power(){ blip(660, 0.08, 'square', 0.4); blip(990, 0.1, 'square', 0.4, actx && actx.currentTime + 0.09); },
  win(){ [523,659,784,1046].forEach((f,i)=>blip(f,0.15,'square',0.4, actx && actx.currentTime + i*0.13)); },
  lose(){ [392,330,262,196].forEach((f,i)=>blip(f,0.2,'triangle',0.4, actx && actx.currentTime + i*0.16)); }
};
// BGM：单曲循环（小调进行曲），lookahead 调度
const MELODY = [440,0,523,440,659,0,523,440,392,0,440,392,330,0,392,0,
                440,0,523,440,659,0,784,659,523,0,659,523,440,0,440,0];
const BASS   = [110,0,110,0,131,0,131,0,98,0,98,0,110,0,110,0,
                110,0,110,0,131,0,131,0,98,0,98,0,110,0,55,0];
function scheduleMusic(){
  if (!actx || !running) return;
  const STEP = 60 / 150 / 2; // 150bpm 八分音符
  while (musicNextTime < actx.currentTime + 0.25){
    const i = musicPos % MELODY.length;
    if (MELODY[i]) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'square'; o.frequency.value = MELODY[i];
      g.gain.setValueAtTime(0.5, musicNextTime);
      g.gain.exponentialRampToValueAtTime(0.01, musicNextTime + STEP * 0.9);
      o.connect(g); g.connect(musicGain);
      o.start(musicNextTime); o.stop(musicNextTime + STEP);
    }
    if (BASS[i]) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = BASS[i];
      g.gain.setValueAtTime(0.7, musicNextTime);
      g.gain.exponentialRampToValueAtTime(0.01, musicNextTime + STEP * 1.8);
      o.connect(g); g.connect(musicGain);
      o.start(musicNextTime); o.stop(musicNextTime + STEP * 2);
    }
    musicNextTime += STEP;
    musicPos++;
  }
}
function startMusic(){
  if (!actx) return;
  musicNextTime = actx.currentTime + 0.05; musicPos = 0;
  clearInterval(musicTimer);
  musicTimer = setInterval(scheduleMusic, 100);
}
function stopMusic(){ clearInterval(musicTimer); musicTimer = null; }
document.addEventListener('visibilitychange', () => {
  if (!actx) return;
  if (document.hidden) actx.suspend(); else if (running) actx.resume();
});

/* ---------- 实体 ---------- */
function makePlayer(){
  return { x: W/2-16, y: H-90, w: 32, h: 36, speed: 4.2, cooldown: 0, double: 0, invincible: 90, alive: true };
}
function spawnEnemy(){
  const r = Math.random();
  if (r < cfg.midChance) {
    enemies.push({ type:'mid', x: Math.random()*(W-52), y:-50, w:52, h:40,
      vx:0, vy: cfg.enemySpeed*0.55, hp:4, score:300 });
  } else if (r < cfg.midChance + 0.3) {
    const fromLeft = Math.random() < 0.5;
    enemies.push({ type:'diag', x: fromLeft ? -30 : W+2, y: Math.random()*H*0.25, w:28, h:24,
      vx: (fromLeft?1:-1) * cfg.enemySpeed*0.8, vy: cfg.enemySpeed*0.8, hp:1, score:150 });
  } else {
    enemies.push({ type:'small', x: Math.random()*(W-28), y:-30, w:28, h:24,
      vx:0, vy: cfg.enemySpeed, hp:1, score:100 });
  }
}
function spawnBoss(){
  boss = { x: W/2-60, y: -100, w:120, h:80, vx:1.6, hp: cfg.bossHp, maxHp: cfg.bossHp,
    entering: true, fireTimer: 60 };
}
function boom(x, y, big){
  const n = big ? 30 : 12;
  for (let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = Math.random()*(big?4.5:2.5)+1;
    particles.push({ x, y, dx:Math.cos(a)*s, dy:Math.sin(a)*s,
      life: 18+Math.random()*16,
      color: Math.random()<.5 ? '#ffb300' : (Math.random()<.5?'#e5483c':'#fff') });
  }
}
function dropPower(x, y){
  if (Math.random() > 0.09) return;
  const life = Math.random() < 0.25;
  drops.push({ x, y, w:22, h:22, vy:1.6, kind: life ? 'life' : 'double' });
}

/* ---------- 初始化 ---------- */
function startLevel(lv){
  level = lv; cfg = levelConfig(lv);
  player = makePlayer();
  enemies = []; bullets = []; ebullets = []; drops = []; particles = []; boss = null;
  kills = 0; killTarget = cfg.killTarget;
  spawnTimer = 30; frame = 0;
  if (cfg.isBoss) spawnBoss();
  updateHud();
}
function initStars(){
  stars = Array.from({length: 70}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    s: Math.random()*1.6 + 0.4, v: Math.random()*1.4 + 0.4
  }));
}
function updateHud(){
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = lives;
  document.getElementById('score').textContent = score;
  document.getElementById('enemies').textContent = cfg.isBoss
    ? (boss ? boss.hp : 0)
    : Math.max(0, killTarget - kills);
}

/* ---------- 更新 ---------- */
function shoot(){
  if (player.cooldown > 0) return;
  const cx = player.x + player.w/2;
  if (player.double > 0) {
    bullets.push({ x: cx-12, y: player.y-6, w:5, h:12, vy:-9 });
    bullets.push({ x: cx+7, y: player.y-6, w:5, h:12, vy:-9 });
  } else {
    bullets.push({ x: cx-2.5, y: player.y-8, w:5, h:12, vy:-9 });
  }
  player.cooldown = 9;
  sfx.shoot();
}
function hitPlayer(){
  if (godMode || player.invincible > 0) return;
  lives--; updateHud();
  boom(player.x+player.w/2, player.y+player.h/2, true);
  sfx.boom();
  if (lives <= 0) { player.alive = false; gameOver(false); }
  else { player.x = W/2-16; player.y = H-90; player.invincible = 120; }
}
function killEnemy(e){
  e.hp = 0;
  kills++; score += e.score;
  boom(e.x+e.w/2, e.y+e.h/2, e.type === 'mid');
  sfx.boom();
  dropPower(e.x+e.w/2, e.y+e.h/2);
  updateHud();
  if (!cfg.isBoss && kills >= killTarget) gameOver(true);
}

function update(){
  frame++;
  // 星空
  for (const s of stars){ s.y += s.v; if (s.y > H) { s.y = -2; s.x = Math.random()*W; } }

  // 玩家
  if (player.alive){
    if (player.invincible > 0) player.invincible--;
    if (player.cooldown > 0) player.cooldown--;
    if (player.double > 0) player.double--;
    let dx = 0, dy = 0;
    if (keys.left) dx -= 1;
    if (keys.right) dx += 1;
    if (keys.up) dy -= 1;
    if (keys.down) dy += 1;
    player.x = clamp(player.x + dx*player.speed, 2, W-player.w-2);
    player.y = clamp(player.y + dy*player.speed, H*0.35, H-player.h-4);
    shoot(); // 自动开火
  }

  // 刷怪
  if (!cfg.isBoss){
    spawnTimer--;
    // 剩余击杀数不足时少刷，避免尾关刷屏
    const pending = enemies.length;
    if (spawnTimer <= 0 && kills + pending < killTarget + 4){
      spawnEnemy();
      spawnTimer = cfg.spawnInterval;
    }
  }

  // 敌机
  for (const e of enemies){
    e.x += e.vx; e.y += e.vy;
    if (e.type === 'mid' && Math.random() < cfg.fireRate * 2 && e.y < player.y) {
      const cx = e.x+e.w/2, cy = e.y+e.h;
      const dx = (player.x+player.w/2) - cx, dy = (player.y+player.h/2) - cy;
      const d = Math.hypot(dx,dy) || 1;
      ebullets.push({ x: cx-3, y: cy, w:6, h:6, vx: dx/d*3, vy: dy/d*3 });
    } else if (e.type !== 'mid' && Math.random() < cfg.fireRate && e.y < player.y) {
      ebullets.push({ x: e.x+e.w/2-3, y: e.y+e.h, w:6, h:6, vx:0, vy:3.4 });
    }
    if (player.alive && aabb(e, player)) { killEnemy(e); hitPlayer(); }
  }
  enemies = enemies.filter((e) => e.hp > 0 && e.y < H+60 && e.x > -60 && e.x < W+60);

  // Boss
  if (boss){
    if (boss.entering){ boss.y += 1.2; if (boss.y >= 30) boss.entering = false; }
    else {
      boss.x += boss.vx;
      if (boss.x < 4 || boss.x > W-boss.w-4) boss.vx *= -1;
      boss.fireTimer--;
      if (boss.fireTimer <= 0){
        boss.fireTimer = Math.max(40, 90 - level);
        // 扇形 5 连弹
        const cx = boss.x+boss.w/2, cy = boss.y+boss.h;
        for (let i=-2;i<=2;i++){
          ebullets.push({ x: cx-3, y: cy, w:6, h:6, vx: i*1.1, vy: 3 });
        }
        sfx.hit();
      }
    }
    if (player.alive && aabb(boss, player)) hitPlayer();
  }

  // 我方子弹
  for (const b of bullets){
    b.y += b.vy;
    for (const e of enemies){
      if (e.hp > 0 && aabb(b, e)){
        b.dead = true; e.hp--;
        if (e.hp <= 0) killEnemy(e); else { boom(b.x, b.y, false); sfx.hit(); }
        break;
      }
    }
    if (!b.dead && boss && !boss.entering && aabb(b, boss)){
      b.dead = true; boss.hp--;
      boom(b.x, b.y, false);
      updateHud();
      if (boss.hp <= 0){
        score += 2000; boom(boss.x+boss.w/2, boss.y+boss.h/2, true); sfx.boom();
        boss = null; updateHud();
        gameOver(true);
      }
    }
  }
  bullets = bullets.filter((b) => !b.dead && b.y > -20);

  // 敌方子弹
  for (const b of ebullets){
    b.x += b.vx; b.y += b.vy;
    if (player.alive && aabb(b, player)){
      b.dead = true;
      if (godMode) boom(b.x, b.y, false);
      else hitPlayer();
    }
  }
  ebullets = ebullets.filter((b) => !b.dead && b.y < H+20 && b.x > -20 && b.x < W+20);

  // 道具
  for (const d of drops){
    d.y += d.vy;
    if (player.alive && aabb(d, player)){
      d.dead = true; sfx.power();
      if (d.kind === 'life') { lives = Math.min(9, lives+1); }
      else { player.double = 60 * 15; }
      updateHud();
    }
  }
  drops = drops.filter((d) => !d.dead && d.y < H+30);

  // 粒子
  particles = particles.filter((p) => {
    p.x += p.dx; p.y += p.dy; p.dx *= .93; p.dy *= .93; p.life--;
    return p.life > 0;
  });
}

/* ---------- 绘制 ---------- */
function drawShip(x, y, w, h, color, dark, down){
  CTX.fillStyle = color;
  const cx = x + w/2;
  if (down){ // 敌机朝下
    CTX.fillRect(cx-w*0.11, y, w*0.22, h*0.75);
    CTX.fillRect(x, y+h*0.15, w, h*0.3);
    CTX.fillStyle = dark;
    CTX.fillRect(cx-w*0.28, y+h*0.55, w*0.56, h*0.25);
  } else { // 玩家机朝上
    CTX.fillRect(cx-w*0.11, y+h*0.25, w*0.22, h*0.75);
    CTX.fillRect(x, y+h*0.5, w, h*0.32);
    CTX.fillStyle = dark;
    CTX.fillRect(cx-w*0.28, y+h*0.2, w*0.56, h*0.28);
    // 尾焰
    if (frame % 6 < 3){
      CTX.fillStyle = '#ffb300';
      CTX.fillRect(cx-3, y+h, 6, 7);
    }
  }
}
function draw(){
  CTX.fillStyle = '#000';
  CTX.fillRect(0,0,W,H);
  CTX.fillStyle = '#9aa3ad';
  for (const s of stars){ CTX.globalAlpha = s.s/2; CTX.fillRect(s.x, s.y, s.s, s.s*2); }
  CTX.globalAlpha = 1;

  if (player.alive){
    if (player.invincible > 0 && (player.invincible>>2)%2 === 0){
      CTX.strokeStyle = '#fff'; CTX.lineWidth = 2;
      CTX.strokeRect(player.x-3, player.y-3, player.w+6, player.h+6);
    }
    drawShip(player.x, player.y, player.w, player.h,
      player.double > 0 ? '#4a9df0' : '#3fca5a',
      player.double > 0 ? '#1c5fa8' : '#1e7a33', false);
    if (godMode){
      CTX.strokeStyle = '#ffb300'; CTX.lineWidth = 2;
      const pad = 4 + Math.sin(frame/6)*1.5;
      CTX.strokeRect(player.x-pad, player.y-pad, player.w+pad*2, player.h+pad*2);
    }
  }

  for (const e of enemies){
    const c = e.type === 'mid' ? ['#b06ae0','#6a3a90'] : e.type === 'diag' ? ['#e5c04a','#9a7c1e'] : ['#e5483c','#8c2018'];
    drawShip(e.x, e.y, e.w, e.h, c[0], c[1], true);
    if (e.type === 'mid'){ // 血条
      CTX.fillStyle = '#2a2a38'; CTX.fillRect(e.x, e.y-6, e.w, 3);
      CTX.fillStyle = '#e5483c'; CTX.fillRect(e.x, e.y-6, e.w * (e.hp/4), 3);
    }
  }

  if (boss){
    drawShip(boss.x, boss.y, boss.w, boss.h, '#e5483c', '#7a1c14', true);
    CTX.fillStyle = '#2a2a38'; CTX.fillRect(20, 8, W-40, 8);
    CTX.fillStyle = '#e5483c'; CTX.fillRect(20, 8, (W-40) * (boss.hp/boss.maxHp), 8);
    CTX.strokeStyle = '#555'; CTX.strokeRect(20, 8, W-40, 8);
  }

  CTX.fillStyle = '#8ef0a0';
  for (const b of bullets) CTX.fillRect(b.x, b.y, b.w, b.h);
  CTX.fillStyle = '#ff8a80';
  for (const b of ebullets) CTX.fillRect(b.x, b.y, b.w, b.h);

  for (const d of drops){
    CTX.fillStyle = d.kind === 'life' ? '#3fca5a' : '#4a9df0';
    CTX.fillRect(d.x, d.y, d.w, d.h);
    CTX.fillStyle = '#fff';
    CTX.font = 'bold 14px monospace'; CTX.textAlign = 'center'; CTX.textBaseline = 'middle';
    CTX.fillText(d.kind === 'life' ? '+1' : 'W', d.x+d.w/2, d.y+d.h/2+1);
  }

  for (const p of particles){
    CTX.globalAlpha = clamp(p.life/18, 0, 1);
    CTX.fillStyle = p.color;
    CTX.fillRect(p.x-2, p.y-2, 4, 4);
  }
  CTX.globalAlpha = 1;
}

/* ---------- 主循环 ---------- */
function loop(){
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ---------- 开始/结束 ---------- */
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');
const ovSub = document.getElementById('ovSub');
const ovBtn = document.getElementById('ovBtn');
const ovBtn2 = document.getElementById('ovBtn2');

function beginRun(){
  ensureAudio();
  overlay.classList.add('hidden');
  ovBtn2.style.display = 'none';
  running = true;
  startMusic();
  loop();
}
ovBtn.onclick = beginRun;
ovBtn2.onclick = () => { store.set('plane_lv', 1); lives = 3; score = 0; startLevel(1); beginRun(); };

function saveBest(){
  if (score > best){ best = score; store.set('plane_best', best); }
}
function gameOver(win){
  running = false;
  stopMusic();
  saveBest();
  if (win) sfx.win(); else sfx.lose();
  setTimeout(() => {
    if (win && level >= MAX_LEVEL){
      ovTitle.textContent = '全部通关!';
      ovTitle.className = 'big win';
      ovSub.innerHTML = `100 关雷霆征途结束<br>最终得分 <b style="color:var(--amber)">${score}</b> · 最高分 ${best}`;
      ovBtn.textContent = '重新开始';
      ovBtn.onclick = () => { store.set('plane_lv', 1); lives=3; score=0; startLevel(1); beginRun(); };
    } else if (win){
      const bonus = level % 5 === 0;
      if (bonus) lives = Math.min(9, lives+1);
      store.set('plane_lv', level+1);
      ovTitle.textContent = `第 ${level} 关 通过!`;
      ovTitle.className = 'big win';
      ovSub.innerHTML = `得分 <b style="color:var(--amber)">${score}</b>` +
        (bonus ? '<br><b style="color:var(--green)">Boss 击破,生命 +1</b>' : '') +
        `<br>第 ${level+1} 关${levelConfig(level+1).isBoss ? ':Boss 战!' : ''}更快更密……`;
      ovBtn.textContent = `进入第 ${level+1} 关 ▶`;
      ovBtn.onclick = () => { startLevel(level+1); beginRun(); };
    } else {
      ovTitle.textContent = '游戏结束';
      ovTitle.className = 'big lose';
      ovSub.innerHTML = `倒在第 <b style="color:var(--amber)">${level}</b> 关 · 得分 ${score} · 最高分 ${best}`;
      ovBtn.textContent = '重玩本关';
      ovBtn.onclick = () => { lives = 3; startLevel(level); beginRun(); };
    }
    overlay.classList.remove('hidden');
  }, 700);
  const fade = () => { update(); draw(); if (particles.length > 0 && !running) requestAnimationFrame(fade); };
  requestAnimationFrame(fade);
}

/* ---------- 输入 ---------- */
const KEYMAP = {
  ArrowUp:'up', KeyW:'up', ArrowDown:'down', KeyS:'down',
  ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right'
};
addEventListener('keydown', (e) => {
  const k = KEYMAP[e.code];
  if (k){ keys[k] = true; e.preventDefault(); }
  if (e.code === 'KeyG') setGod(!godMode);
  if (e.code === 'KeyL' && running){ kills = killTarget; if (boss) boss.hp = 1; else gameOver(true); }
  if (e.code === 'KeyM') cycleSnd();
  if (e.code === 'Enter' && !running && !overlay.classList.contains('hidden')) ovBtn.onclick();
});
addEventListener('keyup', (e) => {
  const k = KEYMAP[e.code];
  if (k){ keys[k] = false; e.preventDefault(); }
});

// 触屏：按住任意处拖动，飞机相对跟随（手指不挡飞机）
const stageEl = document.getElementById('stage');
let moveTouch = null; // {id, fx, fy, px, py}
const SENS = 1.25; // 跟随灵敏度
stageEl.addEventListener('touchstart', (e) => {
  if (e.target.closest('#overlay')) return;
  if (moveTouch === null){
    const t = e.changedTouches[0];
    moveTouch = { id: t.identifier, fx: t.clientX, fy: t.clientY, px: player.x, py: player.y };
  }
  e.preventDefault();
}, {passive:false});
stageEl.addEventListener('touchmove', (e) => {
  if (moveTouch === null) return;
  const rect = stageEl.getBoundingClientRect();
  const scale = W / rect.width; // CSS 像素 → 画布坐标
  for (const t of e.changedTouches){
    if (t.identifier !== moveTouch.id) continue;
    player.x = clamp(moveTouch.px + (t.clientX - moveTouch.fx) * scale * SENS, 2, W-player.w-2);
    player.y = clamp(moveTouch.py + (t.clientY - moveTouch.fy) * scale * SENS, H*0.35, H-player.h-4);
  }
  e.preventDefault();
}, {passive:false});
const endTouch = (e) => {
  for (const t of e.changedTouches){
    if (moveTouch && t.identifier === moveTouch.id) moveTouch = null;
  }
};
stageEl.addEventListener('touchend', endTouch);
stageEl.addEventListener('touchcancel', endTouch);

/* ---------- 无敌 / 声音按钮 ---------- */
function setGod(on){
  godMode = on;
  document.getElementById('godTag').style.display = on ? '' : 'none';
  document.getElementById('godBtn').classList.toggle('on', on);
  store.set('plane_god', on ? '1' : '0');
}
document.getElementById('godBtn').addEventListener('click', function(){ setGod(!godMode); this.blur(); });
function cycleSnd(){
  sndMode = (sndMode + 1) % 3;
  store.set('plane_snd', String(sndMode));
  ensureAudio();
  applySnd();
}
document.getElementById('sndBtn').addEventListener('click', function(){ cycleSnd(); this.blur(); });

/* ---------- 移动端杂项 ---------- */
const hudEl = document.getElementById('hud');
const ctrlEl = document.getElementById('ctrlBar');
function syncHud(){
  const w = stageEl.clientWidth + 'px';
  hudEl.style.width = w; ctrlEl.style.width = w;
}
addEventListener('resize', syncHud);
addEventListener('orientationchange', () => setTimeout(syncHud, 100));
document.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => { if (e.target.closest('#stage,#hud,#ctrlBar,h1')) e.preventDefault(); }, {passive:false});

/* ---------- 首屏 ---------- */
best = parseInt(store.get('plane_best', '0')) || 0;
level = clamp(parseInt(store.get('plane_lv', '1')) || 1, 1, MAX_LEVEL);
setGod(store.get('plane_god', '1') !== '0'); // 默认无敌
applySnd();
lives = 3; score = 0;
initStars();
startLevel(level);
ovSub.innerHTML = `闯关模式 · 共 ${MAX_LEVEL} 关 · 每 5 关 Boss<br>手机:按住屏幕拖动 · 电脑:方向键/WASD<br>自动开火 · 吃 W 双发 · 吃 +1 加命<br>${godMode ? '★ 无敌已开启,点「★ 无敌」可关' : '★ 无敌已关闭,点「★ 无敌」可开'}<br>最高分:${best} · 秘技:G 无敌 · L 跳关 · M 声音`;
ovBtn.textContent = level > 1 ? `继续 · 第 ${level} 关` : '开始游戏';
if (level > 1) ovBtn2.style.display = '';
syncHud();
draw();

/* ---------- 测试钩子 ---------- */
window.__planeDebug = {
  get player(){ return player },
  get enemies(){ return enemies },
  get bullets(){ return bullets },
  get ebullets(){ return ebullets },
  get boss(){ return boss },
  get running(){ return running },
  get god(){ return godMode },
  get lives(){ return lives },
  get score(){ return score },
  get sndMode(){ return sndMode },
};
})();
</script>
